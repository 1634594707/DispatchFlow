# DispatchFlow + Codefolio 宿主机 Nginx 反向代理配置
# 部署位置：/etc/nginx/sites-available/aplicity.online
# 启用：ln -s /etc/nginx/sites-available/aplicity.online /etc/nginx/sites-enabled/
#
# 架构：Cloudflare/用户 → 宿主机 Nginx (SSL 终止 + 域名路由) → Docker 容器 (HTTP-only)
#   - www.aplicity.online  → 127.0.0.1:8081 (DispatchFlow 前端)
#   - app.aplicity.online  → 127.0.0.1:8081 (DispatchFlow 前端，手机端共用)
#   - code.aplicity.online → 127.0.0.1:8082 (Codefolio 前端)
#
# SSL 证书：Let's Encrypt (certbot webroot 申请)
#   证书路径：/etc/letsencrypt/live/www.aplicity.online/

# 通用 SSL 配置（在 http 块中通过 nginx.conf 已包含 sites-enabled/*）

# ==================== HTTP (80) - ACME challenge + 301 跳 HTTPS ====================

# DispatchFlow PC 端
server {
    listen 80;
    listen [::]:80;
    server_name www.aplicity.online;

    # ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 其余请求跳转到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# DispatchFlow 手机端
server {
    listen 80;
    listen [::]:80;
    server_name app.aplicity.online;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # APK 下载（HTTP 也支持，方便部分 WebView 直接下载）
    location /apk/ {
        alias /var/www/apk/;
        autoindex on;
        types {
            application/vnd.android.package-archive apk;
        }
        default_type application/vnd.android.package-archive;
        add_header Content-Disposition "attachment";
        add_header Access-Control-Allow-Origin "*";
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "Thu, 01 Jan 1970 00:00:00 GMT";
        add_header Surrogate-Control "no-store";
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Codefolio
server {
    listen 80;
    listen [::]:80;
    server_name code.aplicity.online;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ==================== HTTPS (443) - 反向代理到 Docker 容器 ====================
# 注：以下 server 块的 ssl 配置由 certbot --nginx 自动注入

# DispatchFlow PC 端
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.aplicity.online;

    # SSL 证书（三个域名共用同一证书）
    ssl_certificate /etc/letsencrypt/live/www.aplicity.online/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.aplicity.online/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # SSE 长连接优化（Cloudflare 100s 超时适配）
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # 真实 IP 传递（P1-4）
    set_real_ip_from 173.245.48.0/20;
    set_real_ip_from 103.21.244.0/22;
    set_real_ip_from 103.22.200.0/22;
    set_real_ip_from 103.31.4.0/22;
    set_real_ip_from 141.101.64.0/18;
    set_real_ip_from 108.162.192.0/18;
    set_real_ip_from 190.93.240.0/20;
    set_real_ip_from 188.114.96.0/20;
    set_real_ip_from 197.234.240.0/22;
    set_real_ip_from 198.41.128.0/17;
    set_real_ip_from 162.158.0.0/15;
    set_real_ip_from 104.16.0.0/13;
    set_real_ip_from 104.24.0.0/14;
    set_real_ip_from 172.64.0.0/13;
    set_real_ip_from 131.0.72.0/22;
    real_ip_header CF-Connecting-IP;

    # 通用头
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ---------------- Phase 5 任务 5.6：安全响应头（6 项） ----------------
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://webapi.amap.com https://restapi.amap.com https://*.amap.com; style-src 'self' 'unsafe-inline' https://*.amap.com; img-src 'self' data: https://*.amap.com https://*.autonavi.com; connect-src 'self' https://*.amap.com https://restapi.amap.com wss: ws:; font-src 'self' data:; frame-src https://*.amap.com; object-src 'none'; base-uri 'self'" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # SSE 端点：长超时（适配 Cloudflare 100s 限制，服务端 90s 超时）
    location ~ ^/api/admin/(stream|events|sse) {
        proxy_pass http://127.0.0.1:8081;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 90s;
        proxy_send_timeout 90s;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
    }

    # 其余请求
    location / {
        proxy_pass http://127.0.0.1:8081;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 50m;
    }
}

