# Mosquitto broker configuration for DispatchFlow
# SEC-08 fix: anonymous access is DISABLED by default. Clients must authenticate
# against the password file generated by scripts/mqtt-init.sh (or mounted at runtime).
#
# Per-listener settings:
#   - listener 1883: plain TCP, requires username/password (default for dev)
#   - listener 8883: TLS, requires username/password AND client cert (production)
#
# To regenerate the password file:
#   docker exec fsd-mosquitto mosquitto_passwd -b /mosquitto/config/passwd <user> <pass>
#   docker exec fsd-mosquitto mosquitto_passwd -b /mosquitto/config/passwd <user2> <pass2>
# (use -c instead of -b for the first user to create the file)

# ---------- default listener (auth required, plain TCP) ----------
listener 1883
allow_anonymous false
password_file /mosquitto/config/passwd

# ---------- optional TLS listener (production) ----------
# Enable by mounting server cert/key + uncommenting the block below.
# listener 8883
# allow_anonymous false
# password_file /mosquitto/config/passwd
# certfile /mosquitto/certs/server.crt
# keyfile /mosquitto/certs/server.key
# cafile /mosquitto/certs/ca.crt
# require_certificate true
# tls_version tlsv1.2

persistence true
persistence_location /mosquitto/data/
log_dest stdout

# ACL: restrict which topics each user can pub/sub. The dispatchflow-fms user needs
# full access to uagv/# ; vehicle credentials should be scoped to their own topics.
# acl_file /mosquitto/config/aclfile
