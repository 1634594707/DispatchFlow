spring:
  datasource:
    url: jdbc:h2:mem:dispatchflow;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  task:
    scheduling:
      enabled: false
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

fsd:
  park:
    enabled: true
    stations:
      - id: 101
        code: A1
        name: A1 Pickup
        x: 220
        y: 170
        area: A
      - id: 201
        code: B1
        name: B1 Dropoff
        x: 220
        y: 620
        area: B
  dispatch:
    outbox:
      retry-delay-ms: 30000
      retry-enabled: false
