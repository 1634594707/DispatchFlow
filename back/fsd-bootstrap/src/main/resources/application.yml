    simulation:
      enabled: ${FSD_PARK_SIMULATION_ENABLED:true}
      vehicle-count: ${FSD_PARK_SIMULATION_VEHICLE_COUNT:3}
      geo-vehicle-count: ${FSD_PARK_SIMULATION_GEO_VEHICLE_COUNT:3}
      max-trail-size: ${FSD_PARK_SIMULATION_MAX_TRAIL_SIZE:30}
      offline-duration-seconds: ${FSD_PARK_SIMULATION_OFFLINE_DURATION_SECONDS:8}
      offline-probability: ${FSD_PARK_SIMULATION_OFFLINE_PROBABILITY:0.005}
      low-battery-threshold: ${FSD_PARK_SIMULATION_LOW_BATTERY_THRESHOLD:25}
      min-assignable-battery: ${FSD_PARK_SIMULATION_MIN_ASSIGNABLE_BATTERY:25}
      full-charge-level: ${FSD_PARK_SIMULATION_FULL_CHARGE_LEVEL:100}
      charge-rate-per-tick: ${FSD_PARK_SIMULATION_CHARGE_RATE_PER_TICK:4}
      reserve-battery-floor: ${FSD_PARK_SIMULATION_RESERVE_BATTERY_FLOOR:8}
      busy-drain-interval-ticks: ${FSD_PARK_SIMULATION_BUSY_DRAIN_INTERVAL_TICKS:4}
      idle-drain-probability: ${FSD_PARK_SIMULATION_IDLE_DRAIN_PROBABILITY:0.06}
  fleet:
    telemetry:
      scheduler-enabled: ${FSD_FLEET_TELEMETRY_SCHEDULER_ENABLED:true}
    energy:
      low-soc-threshold: ${FSD_FLEET_ENERGY_LOW_SOC_THRESHOLD:20}
      return-to-charge-threshold: ${FSD_FLEET_ENERGY_RETURN_TO_CHARGE_THRESHOLD:20}
      min-assignable-soc: ${FSD_FLEET_ENERGY_MIN_ASSIGNABLE_SOC:30}
      full-soc: ${FSD_FLEET_ENERGY_FULL_SOC:100}
      charge-rate-per-tick: ${FSD_FLEET_ENERGY_CHARGE_RATE_PER_TICK:4}
      reserve-soc-floor: ${FSD_FLEET_ENERGY_RESERVE_SOC_FLOOR:8}
      busy-drain-interval-ticks: ${FSD_FLEET_ENERGY_BUSY_DRAIN_INTERVAL_TICKS:8}
      busy-drain-meters-per-percent: ${FSD_FLEET_ENERGY_BUSY_DRAIN_METERS_PER_PERCENT:150}
      idle-drain-probability: ${FSD_FLEET_ENERGY_IDLE_DRAIN_PROBABILITY:0.06}
      plugged-standby-no-drain: ${FSD_FLEET_ENERGY_PLUGGED_STANDBY_NO_DRAIN:true}
      idle-charge-when-no-demand: ${FSD_FLEET_ENERGY_IDLE_CHARGE_WHEN_NO_DEMAND:true}
  admin:
    sse:
      timeout-ms: ${FSD_ADMIN_SSE_TIMEOUT_MS:300000}
      max-connections: ${FSD_ADMIN_SSE_MAX_CONNECTIONS:100}
      ticket-ttl-seconds: ${FSD_ADMIN_SSE_TICKET_TTL_SECONDS:60}
  dispatch:
    scoring:
      weight-distance: ${FSD_DISPATCH_SCORING_WEIGHT_DISTANCE:1.0}
      weight-soc-margin: ${FSD_DISPATCH_SCORING_WEIGHT_SOC_MARGIN:0.15}
      weight-plugged-standby-bonus: ${FSD_DISPATCH_SCORING_WEIGHT_PLUGGED_STANDBY_BONUS:80.0}
    outbox:
      retry-delay-ms: ${FSD_DISPATCH_OUTBOX_RETRY_DELAY_MS:30000}
      retry-enabled: ${FSD_DISPATCH_OUTBOX_RETRY_ENABLED:true}
    lock:
      ttl: ${FSD_DISPATCH_LOCK_TTL:10s}
  alert:
    open-timeout-minutes: ${FSD_ALERT_OPEN_TIMEOUT_MINUTES:30}
    escalation-check-ms: ${FSD_ALERT_ESCALATION_CHECK_MS:60000}
  report:
    mail:
      enabled: ${FSD_REPORT_MAIL_ENABLED:false}
      from: ${FSD_REPORT_MAIL_FROM:dispatchflow@localhost}
      check-ms: ${FSD_REPORT_MAIL_CHECK_MS:60000}
  security:
    admin:
      enabled: ${FSD_ADMIN_AUTH_ENABLED:true}
      # SEC-03 fix: HMAC key for signing admin session tokens. When set, tokens take
      # the form "<sessionSecret>.<hmac>" and cannot be forged even if the DB leaks.
      # When unset, the service falls back to deriving a key from the field-encryption
      # key, or a random per-instance key in pure dev mode.
      token-hmac-key: ${FSD_ADMIN_TOKEN_HMAC_KEY:}
      # SEC-01 fix: static YAML token mapping is DEPRECATED and no longer consulted
      # by AdminAuthInterceptor. All admin authentication MUST use DB-backed sessions.
      # Kept only to avoid binding failures for legacy configs.
      tokens: {}
    field-encryption:
      enabled: ${FSD_FIELD_ENCRYPTION_ENABLED:true}
      key: ${FSD_FIELD_ENCRYPTION_KEY:}
    cors:
      allowed-origins: ${FSD_CORS_ALLOWED_ORIGINS:}
    vehicle-gateway:
      enabled: ${FSD_VEHICLE_GATEWAY_AUTH_ENABLED:true}
  vda5050:
    mqtt:
      enabled: ${FSD_VDA5050_MQTT_ENABLED:false}
      broker-url: ${FSD_VDA5050_MQTT_BROKER:tcp://127.0.0.1:1883}
      client-id: ${FSD_VDA5050_MQTT_CLIENT_ID:dispatchflow-fms}
      interface-name: ${FSD_VDA5050_MQTT_INTERFACE:uagv/v2}
      qos: ${FSD_VDA5050_MQTT_QOS:1}
      # SEC-09 fix: MQTT broker credentials. REQUIRED when enabled=true.
      username: ${FSD_VDA5050_MQTT_USERNAME:}
      password: ${FSD_VDA5050_MQTT_PASSWORD:}
      # SEC-09 fix: optional TLS material (PEM CA cert, PKCS12 client keystore).
      ca-cert-path: ${FSD_VDA5050_MQTT_CA_CERT_PATH:}
      client-cert-path: ${FSD_VDA5050_MQTT_CLIENT_CERT_PATH:}
      client-key-path: ${FSD_VDA5050_MQTT_CLIENT_KEY_PATH:}
  amap:
    web-service-key: ${FSD_AMAP_WEB_SERVICE_KEY:}
    logistics:
      enabled: ${FSD_AMAP_LOGISTICS_ENABLED:false}
      blend-weight: ${FSD_AMAP_LOGISTICS_BLEND_WEIGHT:0.3}
      timeout-ms: ${FSD_AMAP_LOGISTICS_TIMEOUT_MS:3000}
    driving:
      enabled: ${FSD_AMAP_DRIVING_ENABLED:true}
      timeout-ms: ${FSD_AMAP_DRIVING_TIMEOUT_MS:4000}
      base-url: ${FSD_AMAP_DRIVING_BASE_URL:https://restapi.amap.com/v3/direction/driving}
      cache-ttl-seconds: ${FSD_AMAP_DRIVING_CACHE_TTL:3600}
  mapf:
    enabled: ${FSD_MAPF_ENABLED:true}
    bucket-ms: ${FSD_MAPF_BUCKET_MS:500}
    horizon-buckets: ${FSD_MAPF_HORIZON_BUCKETS:6}
    zone-grid-size: ${FSD_MAPF_ZONE_GRID_SIZE:4}
    max-replan-attempts: ${FSD_MAPF_MAX_REPLAN_ATTEMPTS:4}
    conflict-penalty-multiplier: ${FSD_MAPF_CONFLICT_PENALTY:3.0}
