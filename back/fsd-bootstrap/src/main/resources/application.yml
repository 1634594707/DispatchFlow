    default-park-code: ${FSD_PARK_DEFAULT_CODE:DEFAULT}
    width: ${FSD_PARK_WIDTH:1200}
    height: ${FSD_PARK_HEIGHT:800}
    min-zoom: ${FSD_PARK_MIN_ZOOM:-1}
    max-zoom: ${FSD_PARK_MAX_ZOOM:3}
    vehicle-speed-px-per-second: ${FSD_PARK_VEHICLE_SPEED_PX_PER_SECOND:8}
    geo:
      enabled: ${FSD_PARK_GEO_ENABLED:true}
      osm-geo-path: ${FSD_PILOT_OSM_GEO_PATH:../../data/pilot_osm_geo.json}
      anchor-lng: ${FSD_PARK_GEO_ANCHOR_LNG:121.080354}
      anchor-lat: ${FSD_PARK_GEO_ANCHOR_LAT:31.961977}
      park-width-meters: ${FSD_PARK_GEO_WIDTH_M:1570}
      park-height-meters: ${FSD_PARK_GEO_HEIGHT_M:470}
      scenario: ${FSD_PARK_GEO_SCENARIO:ZJF_DIESHIQIAO_PILOT}
      # Phase 4：4 点仿射变换参考点（schematic x/y ↔ GCJ-02 lng/lat）
      # 坐标来自 V38 迁移公式：x=(lng-121.072)*77000, y=(31.9645-lat)*150000
      # 选点覆盖西南/东/西北/东北四个方位，确保仿射变换在全园区内误差 < 10 米
      reference-points:
        - x: 188.881
          y: 615.600
          lng: 121.074453
          lat: 31.960396
        - x: 1155.385
          y: 408.000
          lng: 121.087005
          lat: 31.961780
        - x: 182.259
          y: 142.800
          lng: 121.074367
          lat: 31.963548
        - x: 915.761
          y: 250.050
          lng: 121.083893
          lat: 31.962833
    x-field-alias: currentLongitude
    y-field-alias: currentLatitude
    parking-spots:
