spring:
  application:
    name: fsd-core-server
  datasource:
    # SEC-12 fix: useSSL=true so MySQL connections use TLS. verifyServerCertificate is
    # false by default to avoid requiring CA setup in dev; production deployments should
    # set DB_SSL_MODE=VERIFY_IDENTITY and provide a truststore.
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3307}/${DB_NAME:fsd_core}?useUnicode=true&characterEncoding=UTF-8&characterSetResults=utf8mb4&connectionCollation=utf8mb4_general_ci&serverTimezone=${DB_TIMEZONE:Asia/Shanghai}&useSSL=${DB_USE_SSL:true}&requireSSL=${DB_REQUIRE_SSL:false}&verifyServerCertificate=${DB_VERIFY_SERVER_CERT:false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:changeme}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6380}
      database: ${REDIS_DATABASE:0}
      # SEC-10 fix: Redis password is now required by default. Set REDIS_PASSWORD to
      # an empty string only for trusted local dev environments.
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:3s}
  rabbitmq:
    host: ${RABBITMQ_HOST:127.0.0.1}
    port: ${RABBITMQ_PORT:5673}
    # SEC-11 fix: default credentials are placeholders. Production MUST override via env.
    username: ${RABBITMQ_USERNAME:fsd_user}
    password: ${RABBITMQ_PASSWORD:changeme}
  flyway:
    enabled: ${FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 20
    baseline-description: Pre-Flyway migrations V01-V20
  mail:
    host: ${MAIL_HOST:127.0.0.1}
    port: ${MAIL_PORT:1025}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
  lifecycle:
    timeout-per-shutdown-phase: ${SERVER_SHUTDOWN_TIMEOUT:30s}

server:
  port: ${SERVER_PORT:8080}
  shutdown: ${SERVER_SHUTDOWN:immediate}
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: ${MANAGEMENT_ENDPOINTS_EXPOSURE_INCLUDE:health}
      base-path: /internal/actuator
  endpoint:
    prometheus:
      enabled: true
    health:
      show-details: when-authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    mail:
      enabled: false
  metrics:
    export:
      prometheus:
        enabled: true
  tracing:
    enabled: ${MANAGEMENT_TRACING_ENABLED:false}
    sampling:
      probability: ${MANAGEMENT_TRACING_SAMPLING_PROBABILITY:1.0}
  zipkin:
    tracing:
      endpoint: ${ZIPKIN_ENDPOINT:http://127.0.0.1:9411/api/v2/spans}

springdoc:
  api-docs:
    path: /api-docs
    enabled: ${SPRINGDOC_API_DOCS_ENABLED:false}
  swagger-ui:
    path: /swagger-ui.html
    enabled: ${SPRINGDOC_SWAGGER_UI_ENABLED:false}

