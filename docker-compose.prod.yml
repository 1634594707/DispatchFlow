# DispatchFlow 生产部署
# 使用方式：
#   1. 在服务器上 git pull 代码
#   2. 复制 .env.production 为 .env，填写实际值
#   3. 申请 SSL 证书到 /etc/letsencrypt/live/aplicity.online/
#   4. docker compose -f docker-compose.prod.yml up -d
#
# Cloudflare 配置：
#   DNS A 记录 @ / admin / www 指向本机 IP，代理状态开启
#   SSL/TLS 模式设为 Full (strict)

services:
  # ==================== 基础设施 ====================

  mysql:
    image: mysql:8.4
    container_name: fsd-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: fsd_core
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./back/sql/init:/docker-entrypoint-initdb.d:ro
      - ./back/sql/migrations:/migrations:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - fsd-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
        reservations:
          memory: 512M

  redis:
    image: redis:7.4
    container_name: fsd-redis
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - fsd-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: fsd-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:15673:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 15s
      retries: 10
      start_period: 60s
    networks:
      - fsd-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
        reservations:
          memory: 256M

  # ==================== 后端 ====================

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: fsd-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: fsd_core
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_TIMEZONE: Asia/Shanghai
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: 0
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS}
      FLYWAY_ENABLED: "true"
      # 生产关闭 Swagger 外部访问（仅通过 Nginx 内网白名单放行）
      SPRINGDOC_API_DOCS_ENABLED: "true"
      SPRINGDOC_SWAGGER_UI_ENABLED: "true"
      FSD_ADMIN_AUTH_ENABLED: "true"
      FSD_ADMIN_USER: ${FSD_ADMIN_USER}
      FSD_ADMIN_PASSWORD: ${FSD_ADMIN_PASSWORD}
      FSD_AMAP_WEB_SERVICE_KEY: ${FSD_AMAP_WEB_SERVICE_KEY}
      FSD_CORS_ALLOWED_ORIGINS: ${FSD_CORS_ALLOWED_ORIGINS}
      # P1-1 SSE 超时适配 Cloudflare 90s
      FSD_ADMIN_SSE_TIMEOUT_MS: "90000"
      # P1-6 优雅停机
      SERVER_SHUTDOWN: graceful
      # 禁用 mail health indicator（生产环境不依赖 MailHog）
      MANAGEMENT_HEALTH_MAIL_ENABLED: "false"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8080/internal/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    networks:
      - fsd-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 1536M

  # ==================== 前端 (Nginx + SPA，HTTP-only) ====================
  # SSL 由宿主机 Nginx 统一终止，本容器仅监听 80 端口
  # 宿主机 Nginx 按域名分发：www/app.aplicity.online → 127.0.0.1:8081

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: fsd-frontend
    ports:
      - "127.0.0.1:8081:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - fsd-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
        reservations:
          memory: 128M

networks:
  fsd-network:
    driver: bridge

volumes:
  mysql-data:
    external: true
    name: back_mysql-data
  redis-data:
    external: true
    name: back_redis-data
  rabbitmq-data:
    external: true
    name: back_rabbitmq-data
