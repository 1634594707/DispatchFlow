# DispatchFlow 生产部署
# 使用方式：
#   1. 在服务器上 git pull 代码
#   2. 复制 .env.production 为 .env，填写实际值
#   3. docker compose -f docker-compose.prod.yml up -d
#
# 宝塔面板配置：
#   创建站点 -> 设置 -> 反向代理 -> 目标 URL http://127.0.0.1:${NGINX_PORT:-8081}

services:
  # ==================== 基础设施 ====================

  mysql:
    image: mysql:8.4
    container_name: fsd-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: fsd_core
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:3307:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_general_ci
    volumes:
      - mysql-data:/var/lib/mysql
      - ./back/sql/init:/docker-entrypoint-initdb.d:ro
      - ./back/sql/migrations:/migrations:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 60s
    networks:
      - fsd-network
    restart: unless-stopped

  redis:
    image: redis:7.4
    container_name: fsd-redis
    ports:
      - "127.0.0.1:6380:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - fsd-network
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: fsd-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
      TZ: Asia/Shanghai
    ports:
      - "127.0.0.1:15673:15672"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - fsd-network
    restart: unless-stopped

  # ==================== 后端 ====================

  backend:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: fsd-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      TZ: Asia/Shanghai
      SERVER_PORT: 8080
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: fsd_core
      DB_USERNAME: root
      DB_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      DB_TIMEZONE: Asia/Shanghai
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DATABASE: 0
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASS}
      FLYWAY_ENABLED: "true"
      SPRINGDOC_API_DOCS_ENABLED: "true"
      SPRINGDOC_SWAGGER_UI_ENABLED: "true"
      FSD_ADMIN_AUTH_ENABLED: "true"
      FSD_ADMIN_USER: ${FSD_ADMIN_USER}
      FSD_ADMIN_PASSWORD: ${FSD_ADMIN_PASSWORD}
      FSD_AMAP_WEB_SERVICE_KEY: ${FSD_AMAP_WEB_SERVICE_KEY}
      FSD_CORS_ALLOWED_ORIGINS: ${FSD_CORS_ALLOWED_ORIGINS}
    networks:
      - fsd-network
    restart: unless-stopped

  # ==================== 前端 (Nginx + SPA) ====================

  frontend:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: fsd-frontend
    ports:
      - "${NGINX_PORT:-8081}:80"
    depends_on:
      - backend
    networks:
      - fsd-network
    restart: unless-stopped

networks:
  fsd-network:
    driver: bridge

volumes:
  mysql-data:
  redis-data:
  rabbitmq-data: