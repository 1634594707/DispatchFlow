# =====================================================================
# DispatchFlow 容器内 Nginx 配置（HTTP-only）
# - 位于宿主机 Nginx 反向代理之后，不处理 SSL
# - 宿主机 Nginx 负责 SSL 终止、域名路由、安全头、/internal/ 限制
# - 本配置仅负责：SPA 静态资源、/api/ 反代、SSE 长连接
# =====================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ---------------- Gzip ----------------
    gzip on;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;

    # ---------------- 运行时配置：禁缓存 ----------------
    location = /runtime-config.js {
        add_header Cache-Control "no-store";
        add_header Access-Control-Allow-Origin "*";
    }

    # Service Worker：禁缓存
    location = /sw.js {
        add_header Cache-Control "no-store";
    }

    # ---------------- /api/ 反向代理 ----------------
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 60s;
    }

    # ---------------- SSE 长连接（P1-1 适配 Cloudflare 90s） ----------------
    location /api/admin/sse/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;
        # Cloudflare 免费版 SSE 100s 超时，设为 90s
        proxy_read_timeout 90s;
        send_timeout 90s;
    }

    # ---------------- /internal/ 反代（限制由宿主机 Nginx 处理） ----------------
    location /internal/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $http_x_real_ip;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # ---------------- Swagger / API 文档 ----------------
    location /api-docs {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
    location /swagger-ui.html {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
    location /swagger-ui/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }

    # ---------------- SPA 兜底 ----------------
    location / {
        try_files $uri $uri/ /index.html;
    }
}
