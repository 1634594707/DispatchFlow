name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run Maven tests
        working-directory: back
        run: mvn -pl fsd-bootstrap -am test -B

      - name: Run backend quality gates
        working-directory: back
        run: mvn -pl fsd-bootstrap -am verify -Pquality -B

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: back/**/target/site/jacoco/
          if-no-files-found: ignore

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: front/package-lock.json

      - name: Install dependencies
        working-directory: front
        run: npm ci

      - name: Lint
        working-directory: front
        run: npm run lint -- --max-warnings 50

      - name: Typecheck and build
        working-directory: front
        run: npm run build

      - name: Install Playwright browser
        working-directory: front
        run: npx playwright install --with-deps chrome

      - name: Start backend
        working-directory: back
        run: nohup mvn -pl fsd-bootstrap -am spring-boot:run -DskipTests > ../backend.log 2>&1 &

      - name: Start frontend
        working-directory: front
        run: nohup npm run dev -- --host 127.0.0.1 > ../frontend.log 2>&1 &

      - name: Run V6 E2E gates
        working-directory: front
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
          PERF_API_BASE: http://127.0.0.1:8080/api
        run: npm run test:e2e
